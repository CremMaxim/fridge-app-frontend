worker_processes auto;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';

  access_log /dev/stdout main;

  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  types_hash_max_size 2048;

  server {
    listen 4200;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip compression
    gzip on;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript application/json;
    gzip_disable "msie6";

    # Cache static assets aggressively (hashed Angular assets + static folders)
    location ~* \.(?:css|js|mjs|ico|png|jpg|jpeg|gif|svg|webp|woff|woff2)$ {
      expires 1y;
      add_header Cache-Control "public, immutable";
    }

    location ~* ^/(?:assets|dsa-assets)/ {
      expires 1y;
      add_header Cache-Control "public, immutable";
    }

    # Cache index.html and other HTML files with short expires
    location ~* \.html$ {
      expires 1h;
      add_header Cache-Control "public, must-revalidate";
    }

    # Reverse proxy API requests to the backend service
    location /api/ {
      proxy_pass http://app:8080/api/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Angular SPA: route all requests to index.html
    location / {
      try_files $uri $uri/ /index.html;
    }

    # Deny access to sensitive files
    location ~ /\. {
      deny all;
    }
  }
}

